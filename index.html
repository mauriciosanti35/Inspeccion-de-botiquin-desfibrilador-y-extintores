        <div id="panel-acciones" class="mt-6">
            <button type="button" onclick="generarPDFFix()" class="w-full bg-red-700 text-white font-bold py-4 rounded hover:bg-red-800 transition tracking-[0.1em] uppercase shadow-lg text-sm flex items-center justify-center gap-2">
                📄 Generar Reporte en PDF Ajustado
            </button>
        </div>
    </div>

    <script>
        const estructuraInsumos = [
            { id: 1, nombre: "Manual de primeros auxilios", desc: "Guía básica o manual de primeros auxilios en formato físico, legible y disponible.", inicial: "✔️" },
            { id: 2, nombre: "Alfileres de gancho", desc: "Set de alfileres de seguridad mecánicos para fijación de vendajes.", inicial: "✖️" },
            { id: 3, nombre: "Bandeja de riñón", desc: "Bandeja plástica o de acero inoxidable con forma de riñón para recolección.", inicial: "✖️" },
            { id: 4, nombre: "Tijeras", desc: "Tijera de trauma o de material resistente apta para cortar de forma segura.", inicial: "✔️" },
            { id: 5, nombre: "Apósitos adhesivos (1x3 in)", desc: "Bandas adhesivas (parches curitas) de 2.5 x 7.5 cm envasadas individualmente.", inicial: "✔️" },
            { id: 6, nombre: "Cinta adhesiva en rollo (1 in)", desc: "Cinta médica micropore o esparadrapo de 2.5 cm de ancho.", inicial: "✔️" },
            { id: 7, nombre: "Compresas de gasa estéril (3x3 in)", desc: "Gasas estériles individuales de 7.5 x 7.5 cm para limpieza y cobertura.", inicial: "✔️" },
            { id: 8, nombre: "Vendas de gasa en rollo (1 in)", desc: "Rollos de venda ligeros de 2.5 cm de ancho para retención mecánica.", inicial: "✔️" },
            { id: 9, nombre: "Vendas de gasa en rollo (2 in)", desc: "Rollos de gasa estándar de 5 cm de ancho para cobertura intermedia.", inicial: "✔️" },
            { id: 10, nombre: "Vendas de gasa en rollo (4 in)", desc: "Rollos de gasa anchos de 10 cm para contención y sujeción.", inicial: "✔️" },
            { id: 11, nombre: "Apósitos absorbentes (4x4 in)", desc: "Apósitos de 10 x 10 cm de alta absorción o vendajes de compresión.", inicial: "✔️" },
            { id: 12, nombre: "Vendaje triangular", desc: "Paño triangular multiuso en tela resistente para improvisar cabestrillos.", inicial: "✖️" },
            { id: 13, nombre: "Almohadillado para férula", desc: "Material de amortiguación o algodón protector acolchado previo a inmovilizar.", inicial: "✖️" },
            { id: 14, nombre: "Férulas (Varios tamaños)", desc: "Conjunto estructurado de férulas de inmovilización médica maleables.", inicial: "✖️" },
            { id: 15, nombre: "Toallitas o spray antiséptico", desc: "Solución de limpieza cutánea en formato de toallitas individuales o spray.", inicial: "✔️" },
            { id: 16, nombre: "Guantes de examen médico (caja)", desc: "Caja de guantes desechables de nitrilo o látex para protección biológica.", inicial: "✔️" }
        ];

        // Definición explícita de la cadena Base64 del Logo para reuso en el clon
        const LOGO_BASE64 = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGQAAABkCAYAAABw4pVUAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAI9SURBVHhe7d0xihxBFMVR9womJuYGBm7gInre7mYidm7gInre7mKCgYmJuXv9KiYIdX9b9bSg6v8PD97g0fX6vX6IIdS9X+6Wh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofDv6zX7/Xz7Z7/H9bL/er9cvf5uPst9w9390v186F6/673/S9vIe6X6vlQ/XyoPj5UHx+qjw/Vx4fq40P18aH6+FB9fKg+PlQfH6qPD9XHh+rjQ/Xxofr4UH18qD4+VB8fqo8P1ceH6uND9fGh+vhQfXyoPj5UHx+qjw/Vx4fq40P18aH6+FB9fKg+PlQfH6qPD9XHh+rjQ/Xxofr4UH18qD4+VB8fqo8P1ceH6vOHu/vV+z3eH6vPh909YfV6uX96f0gAAsEIBIIgEAxCIBCEQSAIg0AwCIFAEAhGIBCEgSAQDEEgGIRAIAiDQBAGgSAMAsEgBAJBGAgCwRAEggEIBIEgCANDAAn8O7G7v97b3986X3v6Z8RgepDAPwB7AtMTmN6u99Xp8S/626enmO676+NfdgR7u99SAtM9gYFp789f2gPTPYHpX/S3D/mFmP4AsCcwPYHp7XpfAAn9Fv8A0xOYnsD0BKa9P39pD0z3BKZ/0d8+5BdiAsAIAsEgBAJBGAgCwRAEggEIBIEgCANDAAn8O7EwDAKBIBAMQiAQhIEgEAxCIBAEghEIBGEgCARhIAgEQxAIBiEQCMLwX9br9Xv9AALBCAQCMRD4Cw6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8PhcDgcDofD4XA4HA6Hw+FwOBwOh8P/gR8mFAiX2XbZ0gAAAABJRU5ErkJggg==";

        function renderizarTablaActiva() {
            const tbody = document.getElementById("tablaInsumosActivos");
            tbody.innerHTML = "";

            estructuraInsumos.forEach(insumo => {
                const fila = document.createElement("tr");
                fila.innerHTML = `
                    <td class="border border-black p-2 font-bold bg-gray-50 text-center col-nombre">${insumo.nombre}</td>
                    <td class="border border-black p-2 italic text-gray-600 col-desc">${insumo.desc}</td>
                    <td class="border border-black p-2 text-center text-xl">
                        <select class="w-full bg-white text-center cursor-pointer font-bold focus:outline-none select-estado">
                            <option value="✔️" ${insumo.inicial === '✔️' ? 'selected' : ''}>✔️</option>
                            <option value="✖️" ${insumo.inicial === '✖️' ? 'selected' : ''}>✖️</option>
                            <option value="N/A" ${insumo.inicial === 'N/A' ? 'selected' : ''}>N/A</option>
                        </select>
                    </td>
                    <td class="border border-black p-1">
                        <input type="text" value="${insumo.inicial === '✖️' ? 'Faltante según levantamiento' : ''}" class="w-full outline-none px-1 bg-transparent input-obs" placeholder="Nota...">
                    </td>
                `;
                tbody.appendChild(fila);
            });
        }

        async function generarPDFFix() {
            const supervisor = document.getElementById('inspector').value;
            const area = document.getElementById('areaSeleccionada').value;
            const fecha = document.getElementById('fecha').value;

            if (!supervisor || !area || !fecha) {
                alert("Por favor, complete todos los campos de control (Supervisor, Área y Fecha).");
                return;
            }

            let filasHTML = '';
            const filasPantalla = document.querySelectorAll('#tablaInsumosActivos tr');

            filasPantalla.forEach(fila => {
                const nombre = fila.querySelector('.col-nombre').innerText;
                const desc = fila.querySelector('.col-desc').innerText;
                const estado = fila.querySelector('.select-estado').value;
                const observacion = fila.querySelector('.input-obs').value.trim();

                filasHTML += `
                    <tr>
                        <td style="border:1px solid #000; padding:7px; font-weight:bold; background:#f9fafb; text-align:center; font-size:11px; width:22%; word-wrap:break-word; overflow-wrap:break-word; white-space:normal;">
                            ${nombre}
                        </td>
                        <td style="border:1px solid #000; padding:7px; font-style:italic; color:#4b5563; font-size:11px; width:43%; text-align:left; word-wrap:break-word; overflow-wrap:break-word; white-space:normal;">
                            ${desc}
                        </td>
                        <td style="border:1px solid #000; padding:7px; text-align:center; font-size:15px; font-weight:bold; width:10%;">
                            ${estado}
                        </td>
                        <td style="border:1px solid #000; padding:7px; font-size:11px; width:25%; text-align:left; word-wrap:break-word; overflow-wrap:break-word; white-space:normal;">
                            ${observacion}
                        </td>
                    </tr>
                `;
            });

            const contenedorClon = document.createElement('div');
            contenedorClon.style.width = "800px";
            contenedorClon.style.padding = "20px";
            contenedorClon.style.backgroundColor = "#ffffff";
            contenedorClon.style.fontFamily = "Arial, sans-serif";
            contenedorClon.style.position = "absolute";
            contenedorClon.style.left = "-9999px";
            contenedorClon.style.top = "0";

            document.body.appendChild(contenedorClon);

            contenedorClon.innerHTML = `
                <style>
                    table { width:100%; border-collapse:collapse; table-layout:fixed; }
                    td, th { word-wrap:break-word; overflow-wrap:break-word; white-space:normal; }
                    tr { page-break-inside:avoid !important; break-inside:avoid !important; }
                    thead { display:table-header-group; }
                </style>

                <table style="width:100%; border-collapse:collapse; margin-bottom:20px; border-bottom:2px solid #000;">
                    <tr>
                        <td style="width:75%; text-align:left; vertical-align:middle;">
                            <h1 style="font-size:15px; font-weight:bold; margin:0; color:#111827; text-transform:uppercase; line-height:1.3;">
                                REGISTRO DE INSPECCIÓN MENSUAL AL SISTEMA DE SEGURIDAD OPERACIONAL
                            </h1>
                            <p style="font-size:11px; font-weight:bold; color:#1e3a8a; margin-top:4px; text-transform:uppercase;">
                                Reporte Oficial de Inspección - ACCESS
                            </p>
                        </td>
                        <td style="width:25%; text-align:right; vertical-align:middle;">
                            <img src="${LOGO_BASE64}" style="height:55px; object-fit:contain;">
                        </td>
                    </tr>
                </table>

                <table style="width:100%; margin-bottom:20px; background:#f9fafb; border:1px solid #e5e7eb;">
                    <tr>
                        <td style="padding:10px; width:33%;">
                            <div style="font-size:10px; font-weight:bold; color:#6b7280; text-transform:uppercase;">Supervisor Responsable</div>
                            <div style="font-size:12px; font-weight:bold; color:#1e3a8a;">${supervisor}</div>
                        </td>
                        <td style="padding:10px; width:33%;">
                            <div style="font-size:10px; font-weight:bold; color:#6b7280; text-transform:uppercase;">Fecha de Inspección</div>
                            <div style="font-size:12px; font-weight:bold;">${fecha}</div>
                        </td>
                        <td style="padding:10px; width:33%;">
                            <div style="font-size:10px; font-weight:bold; color:#4b5563; text-transform:uppercase;">Área Evaluada</div>
                            <div style="font-size:12px; font-weight:bold; color:#1e3a8a;">${area}</div>
                        </td>
                    </tr>
                </table>

                <table style="width:100%; table-layout:fixed; border-collapse:collapse; border:2px solid #000;">
                    <thead>
                        <tr style="background:#1e3a8a; color:#fff; text-transform:uppercase; font-size:11px;">
                            <th style="border:1px solid #000; padding:8px; width:22%;">Elemento / Insumo</th>
                            <th style="border:1px solid #000; padding:8px; width:43%; text-align:left;">Descripción y Especificación Técnica</th>
                            <th style="border:1px solid #000; padding:8px; width:10%;">Estado</th>
                            <th style="border:1px solid #000; padding:8px; width:25%; text-align:left;">Comentarios / Observaciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${filasHTML}
                    </tbody>
                </table>

                <table style="width:100%; margin-top:50px; page-break-inside:avoid !important;">
                    <tr>
                        <td style="width:50%; text-align:center; padding-top:40px;">
                            <div style="width:200px; border-top:1px solid #000; margin:auto; padding-top:5px; font-size:11px; font-weight:bold;">
                                Firma Supervisor
                            </div>
                        </td>
                        <td style="width:50%; text-align:center; padding-top:40px;">
                            <div style="width:200px; border-top:1px solid #000; margin:auto; padding-top:5px; font-size:11px; font-weight:bold;">
                                Firma Jefatura / Operaciones
                            </div>
                        </td>
                    </tr>
                </table>
            `;

            // Esperar brevemente a que el DOM interno procese la imagen de manera local
            await new Promise(resolve => setTimeout(resolve, 350));

            const opciones = {
                margin:       10, 
                filename:     `INSPECCION_${area}_${fecha}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    allowTaint: true,
                    logging: false,
                    windowWidth: 800
                },
                pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            await html2pdf().set(opciones).from(contenedorClon).save();
            document.body.removeChild(contenedorClon);
        }

        window.onload = function() {
            document.getElementById('fecha').valueAsDate = new Date();
            renderizarTablaActiva();
        };
    </script>
</body>
</html>
